<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝可梦资讯 - 宝可梦档案馆</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .news-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .news-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .news-header h1 {
            color: #ffcb05;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .news-header p {
            color: #aaa;
            font-size: 1.1rem;
        }
        
        .header-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 203, 5, 0.2);
            color: #ffcb05;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover:not(:disabled) {
            background: rgba(255, 203, 5, 0.3);
            transform: translateY(-2px);
        }
        
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .refresh-btn.refreshing {
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .last-updated {
            color: #888;
            font-size: 0.9rem;
        }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .news-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .news-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .news-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .news-title {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        
        .news-card:hover .news-title {
            color: #ffcb05;
        }
        
        .news-description {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            font-size: 0.85rem;
        }
        
        .news-source {
            background: rgba(255, 203, 5, 0.2);
            padding: 4px 12px;
            border-radius: 12px;
            color: #ffcb05;
        }
        
        .news-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #ffcb05;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffcb05;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 203, 5, 0.2);
            color: #ffcb05;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 203, 5, 0.3);
            transform: translateX(-3px);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        @media (max-width: 600px) {
            .news-header h1 {
                font-size: 1.8rem;
            }
            
            .news-card {
                padding: 16px;
            }
            
            .news-title {
                font-size: 1.1rem;
            }
            
            .news-meta {
                flex-direction: column;
                gap: 8px;
                text-align: left;
            }
            
            .header-actions {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="news-container">
        <a href="../index.html" class="back-btn">
            ← 返回首页
        </a>
        
        <div class="news-header">
            <h1>📰 宝可梦资讯</h1>
            <p>来自 Serebii.net 的最新消息</p>
        </div>
        
        <div class="header-actions">
            <button id="refresh-btn" class="refresh-btn" onclick="refreshNews()">
                🔄 刷新资讯
            </button>
            <span id="last-updated" class="last-updated">最后更新：未知</span>
        </div>
        
        <div id="news-list" class="news-list">
            <div class="loading">加载中</div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="../assets/js/modules/rssParser.js"></script>
    <script>
        let isRefreshing = false;
        
        async function loadNews() {
            const newsList = document.getElementById('news-list');
            
            try {
                const news = await getPokemonNews();
                
                if (news.length === 0) {
                    newsList.innerHTML = '<p style="text-align: center; color: #aaa; padding: 40px;">暂无资讯</p>';
                    return;
                }
                
                // 更新最后更新时间
                const lastUpdated = localStorage.getItem('newsLastUpdated') || '未知';
                document.getElementById('last-updated').textContent = `最后更新：${lastUpdated}`;
                
                newsList.innerHTML = news.map(item => `
                    <article class="news-card">
                        <a href="${item.link}" target="_blank" rel="noopener noreferrer">
                            <h2 class="news-title">${item.title}</h2>
                            <p class="news-description">${item.description}</p>
                            <div class="news-meta">
                                <span class="news-source">${item.source}</span>
                                <span class="news-date">📅 ${item.pubDate}</span>
                            </div>
                        </a>
                    </article>
                `).join('');
                
            } catch (error) {
                console.error('Failed to load news:', error);
                newsList.innerHTML = '<p style="text-align: center; color: #ff6b6b; padding: 40px;">加载资讯失败，请稍后重试</p>';
            }
        }
        
        async function refreshNews() {
            if (isRefreshing) return;
            
            isRefreshing = true;
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.classList.add('refreshing');
            btn.innerHTML = '🔄 刷新中...';
            
            try {
                // 尝试从外部源获取最新资讯
                const freshNews = await fetchFreshNews();
                
                if (freshNews && freshNews.length > 0) {
                    // 更新本地存储
                    localStorage.setItem('cachedNews', JSON.stringify(freshNews));
                    localStorage.setItem('newsLastUpdated', new Date().toLocaleString('zh-CN'));
                    
                    // 重新加载显示
                    await loadNews();
                    
                    showToast('✅ 资讯已更新！');
                } else {
                    showToast('⚠️ 暂无新资讯或获取失败');
                }
            } catch (error) {
                console.error('Failed to refresh news:', error);
                showToast('❌ 刷新失败，请稍后重试');
            } finally {
                isRefreshing = false;
                btn.disabled = false;
                btn.classList.remove('refreshing');
                btn.innerHTML = '🔄 刷新资讯';
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        loadNews();
    </script>
</body>
</html>
